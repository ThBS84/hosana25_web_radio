<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Rádio HOSANA 25</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-color: #1e1e1e;
            --text-color: #ffffff;
            --primary-color: #00ff66;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            background-color: var(--card-color);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
        }

        h1 {
            margin-bottom: 5px;
            font-size: 2rem;
            letter-spacing: 1px;
        }

        /* Status AO VIVO Piscando */
        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 25px;
        }

        .live-indicator {
            width: 12px;
            height: 12px;
            background-color: var(--primary-color);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .live-text {
            color: var(--primary-color);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* Controles do Player */
        .controls {
            margin-top: 20px;
        }

        .play-btn {
            background-color: var(--primary-color);
            border: none;
            color: #000;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .play-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        }

        .play-btn:active {
            transform: scale(0.98);
        }

        .status-player {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>HOSANA 25</h1>
        
        <div class="status-container">
            <div class="live-indicator"></div>
            <span class="live-text">NO AR</span>
        </div>

        <audio id="radioPlayer" preload="none"></audio>

        <div class="controls">
            <button id="playButton" class="play-btn">PLAY</button>
            <p id="playerStatus" class="status-player">Rádio Parada</p>
        </div>
    </div>

    <script>
        // COLOQUE O LINK DO SEU STREAMING AQUI
        const STREAM_URL = "https://stream.zeno.fm/cl4dcvag9slvv"; 

        const audio = document.getElementById('radioPlayer');
        const playButton = document.getElementById('playButton');
        const playerStatus = document.getElementById('playerStatus');

        let isPlaying = false;

        playButton.addEventListener('click', () => {
            if (!isPlaying) {
                // ESTRATÉGIA ANTI-DELAY (Força buscar o áudio do tempo real atual ao dar play)
                audio.src = STREAM_URL + "?t=" + new Date().getTime(); 
                
                playerStatus.innerText = "Conectando ao vivo...";
                
                audio.play()
                    .then(() => {
                        isPlaying = true;
                        playButton.innerText = "PAUSE";
                        playerStatus.innerText = "Tocando Agora";
                    })
                    .catch(error => {
                        console.error("Erro ao reproduzir:", error);
                        playerStatus.innerText = "Erro ao conectar. Tente novamente.";
                    });
            } else {
                // Em streams ao vivo, o ideal é dar 'pause' e limpar o 'src' para economizar dados e evitar delay ao voltar
                audio.pause();
                audio.src = ""; 
                isPlaying = false;
                playButton.innerText = "PLAY";
                playerStatus.innerText = "Rádio Parada";
            }
        });

        // Garante que o áudio continue rodando se a aba perder o foco (segundo plano no ecossistema web)
        document.addEventListener("visibilitychange", () => {
            // Deixamos vazio pois o elemento <audio> nativo já gerencia o background se não for pausado pelo sistema operacional.
        });
    </script>
</body>
</html>
